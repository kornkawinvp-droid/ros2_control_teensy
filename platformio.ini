;   PlatformIO Project Configuration File
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:teensy40]
platform = teensy
board = teensy40
framework = arduino
monitor_speed = 921600
lib_ignore = NativeEthernet, Ethernet
upload_protocol = teensy-cli
upload_flags = --mcu=imxrt1062

lib_deps = 
    https://github.com/micro-ROS/micro_ros_arduino.git#jazzy
    adafruit/Adafruit MPU6050 @ ^2.2.6        ; 🆕 เปลี่ยนมาใช้ Adafruit ให้ตรงกับโค้ด
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    paulstoffregen/Encoder                    ; เผื่อไว้ใช้ในอนาคต (ตอนนี้เราใช้ ISR ดิบ)
    br3ttb/PID                                ; เผื่อไว้ใช้ในอนาคต

build_flags =
    -L.pio/libdeps/teensy40/micro_ros_arduino/src/imxrt1062/fpv5-d16-hard
    -lmicroros